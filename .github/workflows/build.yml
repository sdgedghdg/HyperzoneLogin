name: Weekly Upstream Sync & Gradle Build

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须确保有写权限才能创建 Release

    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Upstream
        run: |
          git remote add upstream https://github.com/sdgedghdg/HyperzoneLogin.git
          git fetch upstream
          git checkout master
          git merge upstream/master --no-edit || echo "No changes"
          git push origin master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # 使用 assemble 确保生成所有模块的 jar 包
          ./gradlew clean assemble

      # 关键排错步骤：列出所有生成的 jar 文件的具体位置
      - name: Locate Jar Files
        run: |
          echo "Finding all .jar files..."
          find . -name "*.jar"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "auto-build-${{ steps.date.outputs.date }}"
          name: "Weekly Auto Build - ${{ steps.date.outputs.date }}"
          body: "此版本由 GitHub Actions 自动构建。同步自上游最新代码。"
          # 使用通配符递归查找，无论 jar 包在哪一层 build/libs 都能抓到
          files: |
            **/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
